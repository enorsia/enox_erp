version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      DB_HOST: db
      DB_DATABASE: enox_suite_db
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      SESSION_DRIVER: redis
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
    networks:
      - enox_suite

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - enox_suite

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan queue:work
    volumes:
      - .:/var/www
    environment:
      DB_HOST: db
      REDIS_HOST: redis
    networks:
      - enox_suite

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: enox_suite_db
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - enox_suite

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - enox_suite

volumes:
  db_data:

networks:
  enox_suite:
    driver: bridge

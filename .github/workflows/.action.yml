name: 🚀 EnoxSuite CI/CD Deployment

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🧠 Parse commit flags
        id: vars
        run: |
          MSG="${{ github.event.head_commit.message }}"
          echo "Commit message: $MSG"

          DEPLOY=false
          FLAGS=""

          # Require deploy flag
          if [[ "$MSG" == *"[ens-deploy]"* ]]; then
            DEPLOY=true
          fi

          # Composer
          if [[ "$MSG" == *"[ens-composer]"* ]]; then
            FLAGS="$FLAGS --composer=yes"
          fi

          # Assets
          if [[ "$MSG" == *"[ens-assets]"* ]]; then
            FLAGS="$FLAGS --assets=yes"
          fi

          # Migration (independent)
          if [[ "$MSG" == *"[ens-migration]"* ]]; then
            FLAGS="$FLAGS --migrate=yes"
          fi
          # Supervisor (independent)
          if [[ "$MSG" == *"[ens-supervisor]"* ]]; then
            FLAGS="$FLAGS --supervisor=yes"
          fi

          # Default fallback → fast
          if [ -z "$FLAGS" ]; then
            FLAGS="--fast"
          fi

          echo "DEPLOY=$DEPLOY" >> $GITHUB_OUTPUT
          echo "FLAGS=$FLAGS" >> $GITHUB_OUTPUT

      - name: 🚀 Deploy via SSH
        if: steps.vars.outputs.DEPLOY == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /srv/enox_erp
            chmod +x deploy.sh
            ./deploy.sh ${{ steps.vars.outputs.FLAGS }}
